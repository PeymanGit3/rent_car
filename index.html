<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentCar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="index..css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Rent<span>Car</span></a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">საქართველოს #1 ქირაობის პლატფორმა</div>
  <h1 class="hero-title">
    იპოვე შენი<br>
    <span class="accent" id="typewriter">სრულყოფილი</span><br>
    მანქანა
  </h1>
  <p class="hero-sub">ათასობით მანქანა მთელს საქართველოში. სწრაფი ჯავშანი, გამჭვირვალე ფასები.</p>
  <div class="hero-actions">
    <a href="filter.html" class="btn-lg outline">ფილტრაცია →</a>
  </div>
</section>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="stat-cars">—</div><div class="stat-label">მანქანა</div></div>
  <div class="stat-item"><div class="stat-num">12+</div><div class="stat-label">ქალაქი</div></div>
  <div class="stat-item"><div class="stat-num">24/7</div><div class="stat-label">მხარდაჭერა</div></div>
  <div class="stat-item"><div class="stat-num">500+</div><div class="stat-label">კლიენტი</div></div>
</div>

<section class="section">
  <div class="section-header">
    <h2 class="section-title">პოპულარული <span>მანქანები</span></h2>
  </div>
  <div class="car-grid" id="popular-grid">
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
  </div>
</section>

<hr class="section-divider">

<section class="section">
  <div class="section-header">
    <h2 class="section-title">სხვა <span>განცხადებები</span></h2>
  </div>
  <div class="car-grid" id="random-grid">
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
    <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line w75"></div><div class="skel skel-line w55"></div><div class="skel skel-line w35"></div></div></div>
  </div>
</section>

<footer>
  <div class="foot-logo">RentCar</div>
  Georgia &copy; 2025
</footer>

<div class="toast" id="toast"></div>

<script src="index..js"></script>
</body>
</html>
