<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentCar — პროფილი</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="profile..css">
<link rel="stylesheet" href="index..css">

</head>
<body>

  
<nav class="navbar">
  <a href="index.html" class="nav-logo">Rent<span>Car</span></a>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div class="page">

  <!-- NOT LOGGED IN -->
  <div class="not-logged" id="not-logged" style="display:none">
    <div style="font-size:3rem;margin-bottom:16px;">🔒</div>
    <h2>ავტორიზაცია საჭიროა</h2>
    <p>პროფილის სანახავად გთხოვთ გაიაროთ ავტორიზაცია</p>
    <button class="btn-gold-big" onclick="window.location.href='login.html'">შესვლა / რეგისტრაცია</button>
  </div>

  <!-- PROFILE CONTENT -->
  <div id="profile-content" style="display:none">

    <!-- HERO -->
    <div class="profile-hero">
      <div class="avatar-big" id="avatar-init">?</div>
      <div class="profile-info">
        <div class="profile-name" id="pname">—</div>
        <div class="profile-phone" id="pphone">—</div>
      </div>
      <div class="profile-stats">
        <div class="stat">
          <div class="stat-num" id="stat-rented">0</div>
          <div class="stat-lbl">ნაქირავები</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-liked">0</div>
          <div class="stat-lbl">მოწონებული</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-posted">0</div>
          <div class="stat-lbl">განთავსებული</div>
        </div>
      </div>
    </div>

    <!-- TABS -->
<div class="profile-tabs-wrap">
  <div class="car-indicator" id="car-indicator">🏎️</div>
  <div class="profile-tabs" id="profile-tabs">
    <button class="ptab active" onclick="showTab('rentals')">ნაქირავები</button>
    <button class="ptab" onclick="showTab('favorites')">მოწონებული</button>
    <button class="ptab" onclick="showTab('posted')">ჩემი განცხადებები</button>
  </div>
</div>

    <!-- TAB: RENTALS -->
    <div id="tab-rentals">
      <div class="cars-grid" id="rental-list">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <!-- TAB: FAVORITES -->
    <div id="tab-favorites" style="display:none">
      <div class="cars-grid" id="fav-grid"></div>
    </div>

    <!-- TAB: POSTED -->
    <div id="tab-posted" style="display:none">
      <div class="cars-grid" id="posted-grid"></div>
    </div>

  </div>
</div>

<footer>
  <div class="foot-logo">RentCar</div>
  Georgia &copy; 2025
</footer>

<div class="toast" id="toast"></div>


<script src="profile.js"></script>

</body>
</html>
